# 쉬운 한국어

[prompt]
save_status = "저장 상태"
unsaved     = "파일 변경"
all_saved   = "저장 완료"
cloud_synced   = "동기화 완료"
cloud_upload   = "클라우드에 미전송"
cloud_download = "클라우드에 업데이트 있음"
conflict       = "확인 필요: 같은 부분이 따로 수정되었습니다"
worktree       = "작업 사본"
tips_hint      = "tips 로 명령어 목록"

[git.status]
untracked  = { short = "새 파일", detail = "아직 저장되지 않은 파일" }
modified   = { short = "수정됨", detail = "내용이 바뀐 파일" }
deleted    = { short = "삭제됨", detail = "삭제된 파일" }
renamed    = { short = "이름 변경", detail = "이름이 바뀐 파일" }
conflicted = { short = "충돌", detail = "같은 부분이 따로 수정되었습니다. 어떤 버전을 사용할지 선택해야 합니다" }
staged     = { short = "선택됨", detail = "다음 저장에 포함될 파일" }
clean      = { short = "변경 없음", detail = "모두 저장되었습니다" }

[git.terms]
add      = { short = "추가", detail = "파일을 다음 저장에 포함시키기" }
commit   = { short = "저장", detail = "변경 사항을 스냅샷으로 기록하기" }
push     = { short = "업로드", detail = "저장한 기록을 클라우드에 보내기" }
pull     = { short = "다운로드", detail = "클라우드에서 최신 내용 가져오기" }
merge    = { short = "합치기", detail = "따로 진행한 작업을 하나로 합치기" }
conflict = { short = "충돌", detail = "같은 부분이 서로 다르게 수정된 상태" }
branch   = { short = "복사해서 작업", detail = "원본에 영향을 주지 않고 따로 작업하기" }
checkout = { short = "전환", detail = "다른 작업 버전으로 이동하기" }
stash    = { short = "임시 보관", detail = "현재 변경 사항을 잠시 치워두기" }
HEAD     = { short = "현재 버전", detail = "지금 보고 있는 버전" }
staging  = { short = "선택 중", detail = "다음 저장에 포함할 파일을 고르는 중" }
remote   = { short = "클라우드", detail = "파일이 공유되는 곳 (예: GitHub)" }
diff     = { short = "변경 내용", detail = "마지막 저장 이후 무엇이 바뀌었는지" }
worktree = { short = "작업 사본", detail = "같은 프로젝트의 다른 버전을 동시에 여는 것. 브라우저에서 다른 페이지를 별도의 탭으로 여는 것과 같습니다" }

[terminal.terms]
permission_denied = { short = "권한 오류", detail = "이 작업에는 관리자 권한이 필요합니다" }
not_found         = { short = "찾을 수 없음", detail = "지정한 파일이나 명령어가 존재하지 않습니다" }
timeout           = { short = "시간 초과", detail = "작업이 너무 오래 걸려 중단되었습니다" }
exit_code         = { short = "결과", detail = "0이면 성공, 그 외는 오류" }
[claude.terms]
tool_use          = { short = "도구 실행", detail = "Claude가 파일 작업이나 명령을 실행하고 있습니다" }
context_window    = { short = "기억 범위", detail = "Claude가 한 번에 기억할 수 있는 양" }
token             = { short = "텍스트 양", detail = "Claude가 처리하는 텍스트 단위" }
compact           = { short = "기억 정리", detail = "Claude의 기억을 압축해서 공간을 만드는 것" }
permission_prompt = { short = "확인", detail = "Claude가 작업 전에 허락을 구하고 있습니다" }
